<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white">

  <nav class="bg-black p-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-bold text-emerald-400">📦 Catálogo Premium</h1>
      <div>
        <button onclick="showSection('catalog')" class="mr-6 hover:text-emerald-400">Catálogo</button>
        <button onclick="showLoginModal()" class="bg-emerald-600 px-6 py-3 rounded-2xl font-medium">🔑 Entrar como Admin</button>
        <button onclick="logout()" id="btnLogout" class="hidden ml-4 text-red-400">Sair</button>
      </div>
    </div>
  </nav>

  <!-- Catálogo -->
  <section id="section-catalog" class="max-w-7xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-bold text-center">Assinaturas Premium</h2>
    <p class="text-center text-gray-400 mt-4">O catálogo aparece aqui</p>
  </section>

  <!-- Admin -->
  <section id="section-admin" class="max-w-7xl mx-auto px-6 py-12 hidden">
    <h2 class="text-3xl font-bold mb-6">Painel Administrativo</h2>
    <p id="adminInfo" class="text-emerald-400"></p>
    <p class="mt-8 text-gray-400">Use as abas Produtos / Vendas / Dashboard aqui (será expandido depois)</p>
  </section>

  <!-- Modal Login -->
  <div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl p-8 w-full max-w-sm mx-4">
      <h3 class="text-2xl font-bold mb-6">Login Administrador</h3>
      <input id="loginEmail" type="email" placeholder="Seu e-mail" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 mb-4">
      <input id="loginPassword" type="password" placeholder="Senha" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 mb-6">
      <button onclick="performLogin()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold">Entrar</button>
      <button onclick="closeLoginModal()" class="mt-4 text-gray-400 w-full">Cancelar</button>
    </div>
  </div>

  <script>
    // === CONFIGURE AQUI ===
    const supabaseUrl = 'https://bhvvdemvhtbfvwxdjvta.supabase.co';   // ← MUDE
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJodnZkZW12aHRiZnZ3eGRqdnRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODA1MzMsImV4cCI6MjA5MTE1NjUzM30.5W5l4SnZdxE1Ir7pGgI6KlQNa8uUteYeXRfUTFCZk0s';             // ← MUDE

    const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    let currentUser = null;

    function showSection(section) {
      document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
      document.getElementById(`section-${section}`).classList.remove('hidden');
    }

    function showLoginModal() {
      document.getElementById('loginModal').classList.remove('hidden');
    }

    function closeLoginModal() {
      document.getElementById('loginModal').classList.add('hidden');
    }

    async function performLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        alert("Digite e-mail e senha");
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        alert("Erro: " + error.message);
      } else {
        currentUser = data.user;
        closeLoginModal();
        document.getElementById('btnLogout').classList.remove('hidden');
        document.getElementById('adminInfo').textContent = "Logado como: " + currentUser.email;
        showSection('admin');
        alert("Login realizado com sucesso!");
      }
    }

    // Função para F12 (adminLogin)
    window.adminLogin = async function() {
      const email = prompt("Digite o e-mail admin:");
      const password = prompt("Digite a senha:");
      if (!email || !password) return;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) alert("Erro: " + error.message);
      else {
        currentUser = data.user;
        document.getElementById('btnLogout').classList.remove('hidden');
        document.getElementById('adminInfo').textContent = "Logado como: " + currentUser.email;
        showSection('admin');
      }
    };

    function logout() {
      supabase.auth.signOut();
      location.reload();
    }

    // Inicia mostrando o catálogo
    window.onload = () => {
      showSection('catalog');
      console.log("%c✅ Página carregada! Teste o botão ou digite adminLogin() no console", "color: lime");
    };
  </script>
</body>
</html>
